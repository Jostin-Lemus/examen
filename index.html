<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuaderno Digital INFRAMEN</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.ckeditor.com/4.22.1/full/ckeditor.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- CABECERA -->
        <div class="cabecera">
            <h1>INFRAMEN</h1>
            <h2>Cuaderno Digital de: Jostin Vladimir</h2>
            <p>Sección 1-2 · Desarrollo de Software</p>
        </div>

        <!-- TÍTULO -->
        <input type="text" id="titulo" placeholder="Título de la hoja...">

        <!-- BARRA DE ACCIONES -->
        <div class="actions-bar">
            <button class="btn-guardar" onclick="guardarNota()">💾 Guardar</button>
            <button class="btn-cargar" onclick="cargarNota()">📂 Cargar</button>
            <button class="btn-listar" onclick="abrirModalNotas()">📋 Ver Notas</button>
            <button class="btn-borrar" onclick="eliminarNota()">🗑 Borrar</button>
            <button class="btn-pdf" onclick="generarPDF()">📄 PDF</button>
            <button class="btn-libro" onclick="abrirLibro()">📖 Ver Libro</button>
            <button class="btn-upload" onclick="document.getElementById('file-input-hidden').click()">📁 Cargar Archivo</button>
            <button class="btn-exportar" onclick="exportarNotas()">⬇ Exportar</button>
            <button class="btn-importar" onclick="document.getElementById('restore-input-hidden').click()">⬆ Importar</button>
            <a href="cuestionario/index.html">
                <button class="btn-cuestionario">❓ Cuestionario</button>
            </a>
        </div>

        <!-- INPUTS OCULTOS -->
        <input type="file" id="file-input-hidden" style="display:none" accept=".pdf,.docx,.doc,.txt,.md,.png,.jpg,.jpeg,.gif,.webp,.bmp,.svg" onchange="manejarArchivoSubido(this)">
        <input type="file" id="restore-input-hidden" style="display:none" accept=".json" onchange="importarNotas(this)">

        <!-- INDICADOR AUTOGUARDADO -->
        <div id="indicador-autoguardado" class="indicador-autoguardado"></div>

        <!-- EDITOR -->
        <textarea id="editor"></textarea>

        <!-- ======= LIBRO ======= -->
        <div class="seccion-libro" id="seccion-libro">
            <h3>📖 Vista de Libro</h3>
            <p class="libro-subtitulo">Haz clic en la portada para abrir el cuaderno</p>

            <div class="cuaderno-escena">
                <div class="cuaderno-cuerpo" id="cuaderno-cuerpo">
                    <div class="cuaderno-tapa-trasera"></div>

                    <div class="cuaderno-paginas" id="cuaderno-paginas">
                        <div class="pagina-contenido">
                            <div class="pagina-titulo" id="pagina-titulo">—</div>
                            <div class="pagina-cuerpo" id="pagina-cuerpo"></div>
                        </div>
                        <div class="pagina-numero" id="pagina-numero">1</div>
                    </div>

                    <svg class="cuaderno-espiral" id="espiral-svg" viewBox="0 0 28 560" preserveAspectRatio="none"></svg>

                    <div class="cuaderno-tapa-front" id="cuaderno-tapa" onclick="toggleTapa()">
                        <div class="tapa-lomo"></div>
                        <div class="tapa-linea"></div>
                        <div class="tapa-titulo">Cuaderno Digital<br>Jostin Vladimir</div>
                        <div class="tapa-linea"></div>
                        <div class="tapa-subtitulo">1-2 · Desarrollo de Software</div>
                        <div class="tapa-hint">— clic para abrir —</div>
                    </div>
                </div>
            </div>

            <div class="libro-nav" id="libro-nav">
                <button class="nav-btn" id="btn-prev" onclick="cambiarPaginaLibro(-1)">&#8592;</button>
                <div class="nav-dots" id="nav-dots"></div>
                <span class="nav-info" id="nav-info">Pág 1 / 1</span>
                <button class="nav-btn" id="btn-next" onclick="cambiarPaginaLibro(1)">&#8594;</button>
            </div>

            <div style="display:flex; gap:1rem; justify-content:center; margin-top:1.5rem;">
                <button class="btn-toggle-cuaderno" id="btn-toggle-tapa" onclick="toggleTapa()">Abrir cuaderno</button>
                <button class="btn-cerrar" onclick="cerrarLibro()">✕ Cerrar sección</button>
            </div>
        </div>

    </div>

    <!-- ======= MODAL NOTAS ======= -->
    <div class="modal-overlay" id="modal-notas" onclick="cerrarModalSiFondo(event)">
        <div class="modal-box">
            <h3>📋 Notas guardadas</h3>
            <div class="lista-notas" id="lista-notas-contenido"></div>
            <button class="btn-cerrar" onclick="cerrarModalNotas()">✕ Cerrar</button>
        </div>
    </div>

    <!-- ======= MODAL ARCHIVO ======= -->
    <div class="modal-overlay" id="modal-archivo" onclick="cerrarModalArchivSiFondo(event)">
        <div class="modal-box modal-archivo-box">
            <div class="modal-archivo-header">
                <span id="modal-archivo-icono">📄</span>
                <div>
                    <h3 id="modal-archivo-nombre">Archivo cargado</h3>
                    <p id="modal-archivo-tipo"></p>
                </div>
            </div>
            <div class="modal-archivo-campo">
                <label for="modal-titulo-input">Título de la hoja</label>
                <input type="text" id="modal-titulo-input" placeholder="Escribe el título para esta nota...">
            </div>
            <div class="modal-archivo-preview" id="modal-archivo-preview"></div>
            <div class="modal-archivo-footer">
                <button class="btn-cerrar" onclick="cerrarModalArchivo()">✕ Cancelar</button>
                <button class="btn-guardar-archivo" id="btn-insertar-archivo" onclick="insertarArchivoEnEditor()">✅ Insertar en editor</button>
            </div>
        </div>
    </div>

    <!-- ======= TOAST ======= -->
    <div id="toast-container"></div>

    <script src="script.js"></script>

</body>
</html>
